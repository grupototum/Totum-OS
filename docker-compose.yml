services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apps-totum-oficial
    restart: unless-stopped
    ports:
      - "3003:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
    labels:
      - "traefik.enable=true"
      # HTTP Router
      - "traefik.http.routers.totum.rule=Host(`apps.grupototum.com`)"
      - "traefik.http.routers.totum.entrypoints=web"
      - "traefik.http.routers.totum.service=totum"
      # HTTPS Router (descomente após configurar SSL no Traefik)
      # - "traefik.http.routers.totum-secure.rule=Host(`apps.grupototum.com`)"
      # - "traefik.http.routers.totum-secure.entrypoints=websecure"
      # - "traefik.http.routers.totum-secure.tls=true"
      # - "traefik.http.routers.totum-secure.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.totum-secure.service=totum"
      # Service
      - "traefik.http.services.totum.loadbalancer.server.port=3002"
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  traefik-network:
    external: true
    name: traefik
