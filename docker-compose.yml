services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apps-totum-oficial
    restart: unless-stopped
    ports:
      - "3003:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
    labels:
      - "traefik.enable=true"
      # HTTPS Router (usa certificado automático do Let's Encrypt)
      - "traefik.http.routers.totum.rule=Host(`apps.grupototum.com`)"
      - "traefik.http.routers.totum.entrypoints=websecure"
      - "traefik.http.routers.totum.tls=true"
      - "traefik.http.routers.totum.tls.certresolver=letsencrypt"
      - "traefik.http.routers.totum.service=totum"
      # Service
      - "traefik.http.services.totum.loadbalancer.server.port=3002"
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  traefik-network:
    external: true
    name: traefik
